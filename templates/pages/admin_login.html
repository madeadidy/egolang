{{ define "admin_login" }}
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Login</title>
    <link rel="stylesheet" href="/assets/css/argon-design-system.min.css" />
    <style>
      .login-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #f7f9fc;
      }
      .login-card {
        width: 420px;
        padding: 32px;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 6px 18px rgba(3, 12, 40, 0.08);
      }
    </style>
  </head>
  <body>
    <div class="login-wrapper">
      <div class="login-card">
        <h3 style="margin-bottom: 16px">Admin Sign In</h3>
        {{ if .error }}
        <div class="alert alert-danger">{{ .error }}</div>
        {{ end }}
        <form action="/admin/login" method="POST">
          <div class="form-group">
            <label>Email</label>
            <input name="email" class="form-control" type="email" placeholder="admin@example.com" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input name="password" class="form-control" type="password" placeholder="password" required />
          </div>
          <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 16px">
            <div><input type="checkbox" id="remember" name="remember" /> <label for="remember">Remember me</label></div>
            <button class="btn btn-primary" type="submit">Login</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
{{ end }}
