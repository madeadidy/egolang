{{ define "admin/product_form" }}
<div class="container mt-4">
  <h3>{{ if .product }}Edit Product{{ else }}New Product{{ end }}</h3>
  <form method="POST" action="{{ if .product }}/admin/products/{{ .product.ID }}{{ else }}/admin/products{{ end }}">
    <div class="form-group">
      <label>Name</label>
      <input name="name" class="form-control" value="{{ if .product }}{{ .product.Name }}{{ end }}" />
    </div>
    <div class="form-group">
      <label>Price</label>
      <input name="price" class="form-control" value="{{ if .product }}{{ .product.Price.StringFixed 2 }}{{ end }}" />
    </div>
    <div class="form-group">
      <label>Stock</label>
      <input name="stock" class="form-control" value="{{ if .product }}{{ .product.Stock }}{{ end }}" />
    </div>
    <div class="form-group">
      <label>Short description</label>
      <textarea name="short_description" class="form-control">{{ if .product }}{{ .product.ShortDescription }}{{ end }}</textarea>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description" class="form-control">{{ if .product }}{{ .product.Description }}{{ end }}</textarea>
    </div>
    <button class="btn btn-primary">Save</button>
  </form>
</div>
{{ end }}
